steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_MAPS_API_KEY=${_MAPS_KEY}
      - --build-arg
      - NEXT_PUBLIC_APP_NAME=Samadhaan
      - --build-arg
      - NEXT_PUBLIC_VOICE_NUMBER=${_VOICE_NUMBER}
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}"]
images:
  - ${_IMAGE}
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE: us-central1-docker.pkg.dev/causal-galaxy-415009/samadhaan/web:latest
  _MAPS_KEY: ""
  _VOICE_NUMBER: ""
